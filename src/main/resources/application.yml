app:
  upload:
    dir: uploads
  obs:
    endpoint: https://obs.cn-north-4.myhuaweicloud.com
    accessKey: YOUR_OBS_ACCESS_KEY
    secretKey: YOUR_OBS_SECRET_KEY
    bucket: your-bucket-name

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/flowable?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: flowable
    password: flowable
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

flowable:
  database-schema-update: true
  check-process-definitions: false
