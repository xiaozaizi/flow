server:
  port: 8080

app:
  upload:
    max-size: 10485760 # 10 MB default
  obs:
    endpoint: ${OBS_ENDPOINT:}
    accessKey: ${OBS_ACCESS_KEY:}
    secretKey: ${OBS_SECRET_KEY:}
    bucket: ${OBS_BUCKET:}
    presignedExpirySeconds: ${OBS_PRESIGNED_EXPIRY:3600}

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/flowable?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: flowable
    password: flowable
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

flowable:
  database-schema-update: true
  check-process-definitions: false
