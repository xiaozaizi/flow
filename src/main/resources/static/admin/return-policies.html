<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Return Policy Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <style>
      body { font-family: Arial, Helvetica, sans-serif; padding: 16px; }
      #app { max-width: 1000px; margin: 0 auto; }
      .form-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
      .cards { display:flex; flex-wrap:wrap; gap:12px; }
    </style>
  </head>
  <body>
    <div id="app">
      <el-card>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h2>Return Policy Management</h2>
          <div>
            <el-input placeholder="Admin Token (optional)" v-model="adminHeader" style="width:280px"></el-input>
            <el-button type="primary" @click="fetchPolicies">Refresh</el-button>
          </div>
        </div>

        <el-divider></el-divider>

        <div style="margin-bottom:16px">
          <el-form :model="form" label-width="160px" size="small">
            <el-form-item label="Tenant Id">
              <el-input v-model="form.tenantId" placeholder="tenant_abc"></el-input>
            </el-form-item>
            <el-form-item label="Process Definition Key">
              <el-input v-model="form.processDefinitionKey" placeholder="sampleApproval"></el-input>
            </el-form-item>
            <el-form-item label="Allow All Targets">
              <el-switch v-model="form.allowAll"></el-switch>
            </el-form-item>
            <el-form-item label="Allowed Targets (comma separated)">
              <el-input v-model="form.allowedTargets" placeholder="start,approveTask"></el-input>
            </el-form-item>
            <el-form-item>
              <el-button type="primary" @click="savePolicy">Save Policy</el-button>
              <el-button @click="clearForm">Clear</el-button>
            </el-form-item>
          </el-form>
        </div>

        <el-divider></el-divider>

        <div>
          <h3>Existing Policies</h3>
          <el-table :data="policies" style="width:100%" v-if="policies.length>0">
            <el-table-column prop="tenantId" label="Tenant"></el-table-column>
            <el-table-column prop="processDefinitionKey" label="Process Key"></el-table-column>
            <el-table-column label="Allow All">
              <template #default="{ row }">{{ row.allowAll }}</template>
            </el-table-column>
            <el-table-column prop="allowedTargets" label="Allowed Targets"></el-table-column>
            <el-table-column label="Actions">
              <template #default="{ row }">
                <el-button type="primary" size="small" @click="editPolicy(row)">Edit</el-button>
                <el-button type="danger" size="small" @click="deletePolicy(row)">Delete</el-button>
              </template>
            </el-table-column>
          </el-table>
          <div v-else>
            <p>No return policies configured yet. Create one above.</p>
          </div>
        </div>
      </el-card>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script>
      const { createApp, ref } = Vue;
      const app = createApp({
        data() {
          return {
            adminHeader: 'true',
            form: { tenantId: '', processDefinitionKey: '', allowAll: false, allowedTargets: '' },
            policies: []
          }
        },
        methods: {
          async fetchPolicies() {
            try {
              const headers = { 'X-Admin': this.adminHeader };
              const res = await fetch('/admin/return-policies', { headers });
              if (!res.ok) { throw new Error('Failed to fetch policies: ' + res.status); }
              this.policies = await res.json();
            } catch (e) {
              this.$message.error('Error fetching policies: ' + e.message);
            }
          },
          async savePolicy() {
            try {
              if (!this.form.tenantId || !this.form.processDefinitionKey) { this.$message.warning('tenantId and processDefinitionKey required'); return; }
              const params = new URLSearchParams();
              params.append('tenantId', this.form.tenantId);
              params.append('processDefinitionKey', this.form.processDefinitionKey);
              params.append('allowAll', this.form.allowAll);
              if (this.form.allowedTargets) params.append('allowedTargets', this.form.allowedTargets);
              const res = await fetch('/admin/return-policies', {
                method: 'POST',
                headers: { 'X-Admin': this.adminHeader, 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
              });
              if (!res.ok) throw new Error('Save failed: ' + res.status);
              const data = await res.json();
              this.$message.success('Policy saved');
              this.fetchPolicies();
            } catch (e) {
              this.$message.error('Error saving policy: ' + e.message);
            }
          },
          editPolicy(row) {
            this.form.tenantId = row.tenantId;
            this.form.processDefinitionKey = row.processDefinitionKey;
            this.form.allowAll = row.allowAll;
            this.form.allowedTargets = row.allowedTargets || '';
            this.$message.info('Editing policy for ' + row.tenantId + '/' + row.processDefinitionKey);
          },
          async deletePolicy(row) {
            try {
              const res = await fetch('/admin/return-policies/' + row.id, { method: 'DELETE', headers: { 'X-Admin': this.adminHeader } });
              if (!res.ok) throw new Error('Delete failed: ' + res.status);
              this.$message.success('Policy deleted');
              this.fetchPolicies();
            } catch (e) {
              this.$message.error('Delete error: ' + e.message);
            }
          },
          clearForm() {
            this.form = { tenantId: '', processDefinitionKey: '', allowAll: false, allowedTargets: '' };
          }
        },
        mounted() {
          this.fetchPolicies();
        }
      });
      app.use(ElementPlus);
      app.mount('#app');
    </script>
  </body>
</html>
